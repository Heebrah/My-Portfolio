<!DOCTYPE html>
<html>
  <head>
    <title></title>
  </head>
  <style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #333;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #fff;
  }

  #container {
    background: #ffffff;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    text-align: center;
  }

  /* Inputs */
  input {
    width: 100%;
    height: 40px;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
  }

  input:focus {
    border-color: #667eea;
    box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
  }

  /* Sections */
  .inpNum {
    display: none;
    margin-top: 15px;
    font-size: 14px;
  }

  /* Buttons */
  button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: translateY(-2px);
    opacity: 0.9;
  }

  /* Result */
  .js-result {
    margin-top: 20px;
    font-size: 18px;
    color: #fff;
    text-align: center;
  }

  /* Start Button Special */
  #startButton {
    background: linear-gradient(135deg, #00c9ff, #92fe9d);
    color: #000;
  }

  #startButton:hover {
    opacity: 0.9;
  }
</style>
  <body>
    <h1>Quadratic Equation</h1><br>
    <div id="container">
     
      <button id="startButton" onclick="startQuadratic()">START</button>
      <p class="inpNum val1">
        first number
        <input type="text" class="js-firstNumber" id="js-firstNumber"  placeholder="Enter first number" /><br><br>
        <button onclick="gotoSecondInput()">Enter</button>
      </p>
      <p class="inpNum val2">
        second number <input type="text" class="js-secondNumber" placeholder="Enter second number"/><br><br>
        <button onclick="gotoThirdInput()">Enter</button>
      </p>
      <p class="inpNum val3">
        third number <input type="text" class="js-thirdNumber" placeholder="Enter third number"/><br><br>
        <button onclick="quadratic()">Result</button>
      </p>
      
    </div>
    <p class="js-result"></p>
    
  </body>
  <script>
  const firstElement = document.querySelector("#js-firstNumber");
  const secondElement = document.querySelector(".js-secondNumber");
  const thirdElement = document.querySelector(".js-thirdNumber");


    function quadratic() {
      if(isNaN(thirdElement.value) || thirdElement.value.trim() === ''){
        alert('please enter the third value')
      }
      else{
        const num1 = Number(firstElement.value);

const num2 = Number(secondElement.value);

const num3 = Number(thirdElement.value);

const determinant = num2 * num2 - 4 * num1 * num3;

//if (determinant > 0){

let quadratic = (-num2 + Math.sqrt(determinant)) / (2 * num1);
let quadratic2 = (-num2 - Math.sqrt(determinant)) / (2 * num1);

//}
//return[quadratic, quadratic2]
//console.log(quadratic)

document.querySelector(
  ".js-result"
).innerHTML = `Number x<sub>1</sub> = ${quadratic} <br> Number x<sub>2</sub> = ${quadratic2}`;
start.style.display = 'block'
numVal3.style.display = 'none'
      }
     
    }



    const start = document.getElementById('startButton')

    const numVal1 = document.querySelector(".val1");
    const numVal2 = document.querySelector(".val2");
    const numVal3 = document.querySelector(".val3");

    // function  to start 
    function startQuadratic() {
      firstElement.value = ''
      secondElement.value = ''
      thirdElement.value = ''
      document.querySelector('.js-result').innerHTML = ''
    
        numVal1.style.display = 'block'
        start.style.display = 'none'
      
    }

    function gotoSecondInput(){
        if(isNaN(firstElement.value) || firstElement.value.trim() === ''){
           
           alert('please enter a value')
           console.log(firstElement.value)
        }
        else{
          numVal1.style.display = 'none'
           numVal2.style.display = 'block'
           console.log(firstElement.value)
        }
    }

    function gotoThirdInput(){
     
        if(isNaN(secondElement.value) || secondElement.value.trim() === ''){
           
           alert('please enter a value')
        }
        else{
           numVal2.style.display = 'none'
           numVal3.style.display = 'block'
        }
        return 
    }
  
  firstElement.addEventListener("keydown", (e) => {
  if (e.key === "Enter") gotoSecondInput();
});

secondElement.addEventListener("keydown", (e) => {
  if (e.key === "Enter") gotoThirdInput();
});

thirdElement.addEventListener("keydown", (e) => {
  if (e.key === "Enter") quadratic();
});
  </script>
</html>
